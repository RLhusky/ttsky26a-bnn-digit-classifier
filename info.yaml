# Tiny Tapeout project information
project:
  title:        "BNN Digit Classifier"
  author:       "Nicholas Fong"
  discord:      ""
  description:  "Binary neural network MNIST digit classifier — 94% accuracy, 1-MAC serial engine"
  language:     "Verilog"
  clock_hz:     10000000    # 10 MHz

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "4x2"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_bnn_digit_classifier"

  # List your project's source files here.
  source_files:
    - "tt_um_bnn_digit_classifier.v"
    - "bnn_core.v"
    - "pixel_lut.v"
    - "argmax.v"
    - "weight_rom_l1.v"
    - "weight_rom_l2.v"
    - "weight_rom_out.v"

pinout:
  # Inputs
  ui[0]: "pixel_data[0]"
  ui[1]: "pixel_data[1]"
  ui[2]: "pixel_data[2]"
  ui[3]: "pixel_data[3]"
  ui[4]: "pixel_data[4]"
  ui[5]: "pixel_data[5]"
  ui[6]: "pixel_data[6]"
  ui[7]: "pixel_data[7]"

  # Outputs
  uo[0]: "prediction[0]"
  uo[1]: "prediction[1]"
  uo[2]: "prediction[2]"
  uo[3]: "prediction[3]"
  uo[4]: "result_valid"
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "data_valid (input)"
  uio[1]: "start (input)"
  uio[2]: "busy (output)"
  uio[3]: "result_ready (output)"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
